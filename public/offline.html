<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline</title>
    <style>
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #111827;
        color: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .card {
        max-width: 28rem;
        padding: 2rem;
        border-radius: 1rem;
        background: rgba(15, 23, 42, 0.92);
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.3);
      }
      a {
        color: #7dd3fc;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Offline</h1>
      <p>Your alarm app is currently offline.</p>
      <p>Browse previously visited pages or reconnect to access updated content.</p>
      <p>
        <a href="/">Go back to the home screen</a>
      </p>
    </div>
  </body>
</html>
